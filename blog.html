<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — WNTS Media</title>
<meta name="description" content="Thoughts on brand strategy, content, and creative work from the WNTS Media team.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFC61A;--ink:#15130B;--milk:#FFFFFF;--cloud:#F7F6F2;--cobalt:#2B3CFF;--coral:#FF5A47;
  --display:'Bricolage Grotesque',sans-serif;--body:'Instrument Sans',sans-serif;--label:'Space Grotesk',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--milk);color:var(--ink);line-height:1.6}
.wrap{max-width:900px;margin:0 auto;padding:0 24px}
a{color:inherit}
:focus-visible{outline:3px solid var(--cobalt);outline-offset:3px;border-radius:4px}
nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav-in{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo img{height:34px;width:auto;display:block}
.nav-links{display:flex;gap:24px;align-items:center;list-style:none}
.nav-links a{text-decoration:none;font-weight:600;font-size:.95rem}
.btn{display:inline-block;background:var(--ink);color:var(--sun);font-family:var(--label);font-weight:700;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:12px 22px;border-radius:999px;text-decoration:none;border:3px solid var(--ink);transition:transform .2s ease,background .2s ease}
.btn:hover{background:var(--coral);color:var(--ink);transform:translateY(-2px)}
header.hero{padding:150px 0 60px;background:var(--cloud)}
.eyebrow{font-family:var(--label);font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cobalt)}
h1{font-family:var(--display);font-weight:800;font-size:clamp(2.4rem,6vw,4rem);letter-spacing:-.02em;margin:.4em 0 .3em}
.sub{font-size:1.1rem;max-width:560px;color:#5a5747}
.posts{padding:70px 0 120px}
.post-card{display:block;text-decoration:none;color:inherit;padding:32px 0;border-bottom:1px solid #eee;transition:transform .25s ease}
.post-card:hover{transform:translateX(6px)}
.post-date{font-family:var(--label);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cobalt);margin-bottom:10px;display:block}
.post-title{font-family:var(--display);font-weight:800;font-size:1.6rem;letter-spacing:-.01em;margin-bottom:10px}
.post-excerpt{color:#5a5747;font-size:1.02rem}
.empty{padding:60px 0;color:#5a5747}
footer{background:var(--ink);color:var(--milk);padding:26px 0;margin-top:0}
.foot-in{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:.85rem}
.foot-in img{height:22px;filter:brightness(0) invert(1)}
@media(max-width:640px){.nav-links{display:none}}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a class="logo" href="/"><img src="/images/WNTS_logo.svg" alt="WNTS Media"></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/blog.html">Blog</a></li>
      <li><a class="btn" href="/#contact">Start a project</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <span class="eyebrow">The Blog</span>
    <h1>Thoughts, notes &amp; the occasional strong opinion.</h1>
    <p class="sub">Brand strategy, content lessons, and behind-the-scenes from the WNTS Media team.</p>
  </div>
</header>

<section class="posts">
  <div class="wrap" id="postList">
    <p class="empty">Loading posts...</p>
  </div>
</section>

<footer>
  <div class="foot-in">
    <img src="/images/WNTS_logo.svg" alt="WNTS Media">
    <span>© 2026 WNTS Media · We Need To Smile</span>
  </div>
</footer>

<script>
fetch('/content/blog.json').then(r=>r.json()).then(d=>{
  const list=document.getElementById('postList');
  const posts=(d.posts||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!posts.length){list.innerHTML='<p class="empty">No posts yet — check back soon.</p>';return}
  list.innerHTML=posts.map(p=>{
    const d=new Date(p.date);
    const dateStr=isNaN(d)?'':d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    return `<a class="post-card" href="/blog-post.html?slug=${encodeURIComponent(p.slug)}">
      <span class="post-date">${dateStr}</span>
      <h2 class="post-title">${p.title}</h2>
      <p class="post-excerpt">${p.excerpt||''}</p>
    </a>`;
  }).join('');
}).catch(()=>{
  document.getElementById('postList').innerHTML='<p class="empty">Couldn\'t load posts right now.</p>';
});
</script>
</body>
</html>
