backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Kicker text", name: "kicker", widget: "string" }
          - { label: "Headline line 1", name: "line1", widget: "string" }
          - { label: "Headline line 2 (before smile)", name: "line2", widget: "string" }
          - { label: "Subheading", name: "subhead", widget: "text" }

      - name: "manifesto"
        label: "About / Manifesto"
        file: "content/manifesto.json"
        fields:
          - { label: "Big statement", name: "bigsay", widget: "text" }
          - { label: "Paragraph 1", name: "p1", widget: "text" }
          - { label: "Paragraph 2", name: "p2", widget: "text" }
          - { label: "Paragraph 3", name: "p3", widget: "text" }

      - name: "contact"
        label: "Contact Section"
        file: "content/contact.json"
        fields:
          - { label: "Heading intro", name: "intro", widget: "text" }
          - { label: "Email address", name: "email", widget: "string" }
          - { label: "Instagram handle (main)", name: "instagram", widget: "string" }
          - { label: "Instagram handle (Humans of WNTS)", name: "instagram_humans", widget: "string" }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tag", name: "tag", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Order", name: "order", widget: "number", default: 1 }

  - name: "humans"
    label: "Humans of WNTS"
    folder: "content/humans"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name / Story title", name: "title", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Story number", name: "number", widget: "string" }
      - { label: "Caption", name: "caption", widget: "text" }
