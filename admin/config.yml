backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.json"
        fields:
          - { label: "Kicker text", name: "kicker", widget: "string" }
          - { label: "Headline line 1", name: "line1", widget: "string" }
          - { label: "Headline line 2 (before smile)", name: "line2", widget: "string" }
          - { label: "Subheading", name: "subhead", widget: "text" }

      - name: "manifesto"
        label: "About / Manifesto"
        file: "content/manifesto.json"
        fields:
          - { label: "Big statement", name: "bigsay", widget: "text" }
          - { label: "Paragraph 1", name: "p1", widget: "text" }
          - { label: "Paragraph 2", name: "p2", widget: "text" }
          - { label: "Paragraph 3", name: "p3", widget: "text" }

      - name: "contact"
        label: "Contact Section"
        file: "content/contact.json"
        fields:
          - { label: "Heading intro", name: "intro", widget: "text" }
          - { label: "Email address", name: "email", widget: "string" }
          - { label: "Instagram handle (main)", name: "instagram", widget: "string" }
          - { label: "Instagram handle (Humans of WNTS)", name: "instagram_humans", widget: "string" }

      - name: "seo"
        label: "SEO (Search Appearance)"
        file: "content/seo.json"
        fields:
          - { label: "Page Title (shows in Google & browser tab)", name: "title", widget: "string" }
          - { label: "Meta Description (shows under the title in Google)", name: "description", widget: "text" }
          - { label: "Note", name: "note", widget: "text", default: "Changing these updates Google search results within a few days. The social media share preview (WhatsApp/Twitter/LinkedIn image+text) is separate and needs a manual code update — ask Claude to change it.", required: false }

  - name: "packages"
    label: "Service Packages"
    files:
      - name: "packages"
        label: "Packages"
        file: "content/packages.json"
        fields:
          - label: "Packages"
            name: "packages"
            widget: "list"
            summary: "{{name}} — {{category}}"
            fields:
              - { label: "Category (e.g. Branding, Photography, Wedding, Commercial)", name: "category", widget: "string", required: false }
              - { label: "Tier label (e.g. Starter) — leave blank for the custom card", name: "tier", widget: "string", required: false }
              - { label: "Package name", name: "name", widget: "string" }
              - { label: "Tagline / description", name: "tagline", widget: "string" }
              - { label: "Price display", name: "price", widget: "string", required: false }
              - { label: "Highlighted (shows as most popular)", name: "highlighted", widget: "boolean", default: false }
              - { label: "This is the open-ended 'custom request' card (not a real package)", name: "is_custom", widget: "boolean", default: false }
              - label: "Included items"
                name: "features"
                widget: "list"
                required: false
                field: { label: "Feature", name: "feature", widget: "string" }

  - name: "blog"
    label: "Blog"
    files:
      - name: "posts"
        label: "Blog Posts"
        file: "content/blog.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{title}} — {{date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL slug (no spaces, e.g. our-first-project)", name: "slug", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
              - { label: "Cover image", name: "cover", widget: "image", required: false }
              - { label: "Excerpt (shows on blog list page)", name: "excerpt", widget: "text" }
              - { label: "Body", name: "body", widget: "markdown" }

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tag", name: "tag", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Order", name: "order", widget: "number", default: 1 }

  - name: "humans"
    label: "Humans of WNTS"
    folder: "content/humans"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name / Story title", name: "title", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Photo alt text (describe the photo for accessibility & SEO)", name: "photo_alt", widget: "string", required: false, hint: "e.g. 'Chide smiling while reviewing a storyboard on set'" }
      - { label: "Story number", name: "number", widget: "string" }
      - { label: "Caption", name: "caption", widget: "text" }
