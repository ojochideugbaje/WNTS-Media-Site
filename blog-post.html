<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Blog — WNTS Media</title>
<meta name="description" id="pageDesc" content="A post from the WNTS Media blog.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFC61A;--ink:#15130B;--milk:#FFFFFF;--cloud:#F7F6F2;--cobalt:#2B3CFF;--coral:#FF5A47;
  --display:'Bricolage Grotesque',sans-serif;--body:'Instrument Sans',sans-serif;--label:'Space Grotesk',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--milk);color:var(--ink);line-height:1.7}
.wrap{max-width:720px;margin:0 auto;padding:0 24px}
a{color:var(--cobalt)}
:focus-visible{outline:3px solid var(--cobalt);outline-offset:3px;border-radius:4px}
nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav-in{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo img{height:34px;width:auto;display:block}
.nav-links{display:flex;gap:24px;align-items:center;list-style:none}
.nav-links a{text-decoration:none;font-weight:600;font-size:.95rem;color:var(--ink)}
.btn{display:inline-block;background:var(--ink);color:var(--sun);font-family:var(--label);font-weight:700;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:12px 22px;border-radius:999px;text-decoration:none;border:3px solid var(--ink)}
article{padding:150px 0 100px}
.back{font-family:var(--label);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-decoration:none;display:inline-block;margin-bottom:30px}
.post-date{font-family:var(--label);font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cobalt);display:block;margin-bottom:16px}
h1{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.02em;margin-bottom:30px;line-height:1.1}
.post-body{font-size:1.1rem;color:#2a2820}
.post-body p{margin-bottom:1.4em}
.cover{width:100%;border-radius:16px;margin-bottom:36px;display:block}
.notfound{padding:180px 0 100px;text-align:center}
footer{background:var(--ink);color:var(--milk);padding:26px 0}
.foot-in{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:.85rem}
.foot-in img{height:22px;filter:brightness(0) invert(1)}
@media(max-width:640px){.nav-links{display:none}}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a class="logo" href="/"><img src="/images/WNTS_logo.svg" alt="WNTS Media"></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/blog.html">Blog</a></li>
      <li><a class="btn" href="/#contact">Start a project</a></li>
    </ul>
  </div>
</nav>

<article>
  <div class="wrap" id="postContent">
    <p>Loading...</p>
  </div>
</article>

<footer>
  <div class="foot-in">
    <img src="/images/WNTS_logo.svg" alt="WNTS Media">
    <span>© 2026 WNTS Media · We Need To Smile</span>
  </div>
</footer>

<script>
function escapeHTML(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function simpleMarkdown(md){
  // minimal markdown: paragraphs on blank lines, keeps it safe & simple
  return md.split(/\n\s*\n/).map(p=>'<p>'+escapeHTML(p.trim()).replace(/\n/g,'<br>')+'</p>').join('');
}

const params=new URLSearchParams(window.location.search);
const slug=params.get('slug');
const content=document.getElementById('postContent');

if(!slug){
  content.innerHTML='<div class="notfound"><h1>Post not found</h1><p><a class="back" href="/blog.html">← Back to blog</a></p></div>';
} else {
  fetch('/content/blog.json').then(r=>r.json()).then(d=>{
    const post=(d.posts||[]).find(p=>p.slug===slug);
    if(!post){
      content.innerHTML='<div class="notfound"><h1>Post not found</h1><p><a class="back" href="/blog.html">← Back to blog</a></p></div>';
      return;
    }
    document.getElementById('pageTitle').textContent=post.title+' — WNTS Media';
    if(post.excerpt)document.getElementById('pageDesc').setAttribute('content',post.excerpt);
    const dt=new Date(post.date);
    const dateStr=isNaN(dt)?'':dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    content.innerHTML=`
      <a class="back" href="/blog.html">← Back to blog</a>
      ${post.cover?`<img class="cover" src="${post.cover}" alt="${escapeHTML(post.title)}">`:''}
      <span class="post-date">${dateStr}</span>
      <h1>${escapeHTML(post.title)}</h1>
      <div class="post-body">${simpleMarkdown(post.body||'')}</div>
    `;
  }).catch(()=>{
    content.innerHTML='<div class="notfound"><h1>Couldn\'t load this post</h1><p><a class="back" href="/blog.html">← Back to blog</a></p></div>';
  });
}
</script>
</body>
</html>
